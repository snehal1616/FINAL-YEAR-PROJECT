<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Cureastic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        :root {
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: #f0f7ff;
            overflow-y: auto;
            min-height: 100vh;
        }

        .auth-wrapper {
            position: relative;
            z-index: 1;
            background: none;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(37, 99, 235, 0.08) 0%, transparent 50%);
            z-index: -1;
        }

        .auth-card {
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }

        .auth-logo i { 
            font-size: 3rem;
            background: linear-gradient(135deg, #059669, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .auth-logo h1 { font-family: var(--font-heading); font-weight: 800; font-size: 2.2rem; letter-spacing: -1.2px; }

        .form-group label { font-family: var(--font-heading); font-weight: 700; font-size: 0.9rem; color: #475569; }
        .form-group input { border-radius: 14px; border: 1.5px solid #e2e8f0; height: 50px; font-weight: 500; }

        .btn-primary { 
            height: 55px; border-radius: 16px; font-family: var(--font-heading); 
            font-weight: 800; font-size: 1.05rem; 
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        /* Loading Screen Mirroring Login */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader-logo { font-size: 4rem; color: #10b981; animation: pulse 1.5s infinite ease-in-out; margin-bottom: 20px; }
        .loader-text { font-family: var(--font-heading); font-weight: 800; font-size: 1.6rem; color: #0f172a; }
        .loader-bar { width: 180px; height: 5px; background: #f1f5f9; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: #10b981; animation: progress 2s ease forwards; }

        @keyframes progress { from { width: 0%; } to { width: 100%; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .auth-footer { margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
    </style>
</head>
<body class="auth-wrapper">
    <div class="bg-gradient"></div>

    <div id="loadingOverlay">
        <div class="loader-logo"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="loader-text">Setting up your profile...</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div class="auth-box">
        <div class="card auth-card">
            <div class="auth-logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <h1>Cureastic</h1>
                <p style="color:var(--muted); font-weight: 500; font-size: 0.95rem; margin-top: -5px">Start your health journey today</p>
            </div>

            <div class="error-msg" id="errorMsg" style="border-radius: 12px; margin-bottom: 20px;"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Full Clinical Name</label>
                    <div style="position:relative">
                        <i class="fa-solid fa-user" style="position:absolute; left:18px; top:16px; color:#94a3b8"></i>
                        <input type="text" id="name" placeholder="eg. Johnathan Doe" style="padding-left:50px" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>E-mail Communication</label>
                    <div style="position:relative">
                        <i class="fa-solid fa-envelope-open-text" style="position:absolute; left:18px; top:16px; color:#94a3b8"></i>
                        <input type="email" id="email" placeholder="active-email@provider.com" style="padding-left:50px" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Secure Password</label>
                    <div style="position:relative">
                        <i class="fa-solid fa-key" style="position:absolute; left:18px; top:16px; color:#94a3b8"></i>
                        <input type="password" id="password" placeholder="Min 6 characters" style="padding-left:50px" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="background:#10b981">
                    Create Health Account <i class="fa-solid fa-circle-check" style="margin-left:10px"></i>
                </button>
            </form>

            <div class="auth-footer">
                Already part of the community? <a href="/login" style="font-weight:800; color: #10b981">Identity Login</a>
            </div>
        </div>
        <p style="text-align:center; font-size:0.75rem; color:#64748b; margin-top:20px">By creating an account, you join a global initiative for health awareness.</p>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const err = document.getElementById('errorMsg');
        const overlay = document.getElementById('loadingOverlay');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.style.display = 'none';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Registering...';

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    overlay.style.display = 'flex';
                    setTimeout(() => {
                        window.location = '/dashboard';
                    }, 2000);
                } else {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Create Health Account <i class="fa-solid fa-circle-check" style="margin-left:10px"></i>';
                    err.textContent = data.error || 'Registration service unavailable.';
                    err.style.display = 'block';
                }
            } catch (error) {
                submitBtn.disabled = false;
                err.textContent = 'Server connection failed.';
                err.style.display = 'block';
            }
        });

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
